
version: '3.8'

services:
  db:
    image: postgres:16
    container_name: dimensionlog-db
    environment:
      POSTGRES_DB: dimensionlog
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 2009
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    container_name: dimensionlog-app
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/dimensionlog
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: 2009
    depends_on:
      - db

volumes:
  postgres_data: